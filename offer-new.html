<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Макс Люшер · ИИ-инженер</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;1,14..32,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F6F6F6;
    --bg-soft: #FAFAFA;
    --bg-tint: #F0F0F0;
    --surface: #FFFFFF;
    --surface-tint: #F6F6F6;
    --border: rgba(0,0,0,0.10);
    --border-strong: rgba(0,0,0,0.20);
    --ink: #1A1A1A;
    --ink-soft: rgba(26,26,26,0.72);
    --ink-mute: #6A6A6A;
    --warm: #C9242D;
    --warm-soft: rgba(201,36,45,0.08);
    --warm-line: rgba(201,36,45,0.28);
    --olive: #6A6A6A;
    --red: #A82229;
  }
  html, body {
    min-height: 100vh;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 16px;
    line-height: 1.55;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    font-feature-settings: 'ss01';
  }
  body {
    background: var(--bg);
    position: relative;
  }
  body::before { display: none; }
  .top-bar {
    position: fixed; top: 0; left: 0; right: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 32px;
    z-index: 60;
    background: rgba(16,16,16,0.96);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(255,255,255,0.07);
    pointer-events: none;
  }
  .logo {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 15px; font-weight: 500;
    color: #FFFFFF;
    line-height: 1;
    pointer-events: auto;
    letter-spacing: -0.022em;
  }
  .logo span { color: var(--warm); }
  .live-tag {
    display: inline-flex; align-items: center; gap: 9px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; letter-spacing: -0.01em;
    color: rgba(255,255,255,0.45); text-transform: uppercase;
    font-weight: 500;
    pointer-events: auto;
  }
  .live-tag::before {
    content:''; display: block;
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--warm);
    box-shadow: 0 0 10px rgba(201,36,45,0.6);
    animation: pulse 1.6s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
  .deck {
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 80px 38px 80px;
    position: relative; z-index: 10;
  }
  .slide { display: none; width: 100%; max-width: 1180px; }
  .slide.active { display: block; animation: fadeUp 0.5s cubic-bezier(.2,.6,.2,1) forwards; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
  .h-display { font-family: 'Inter', sans-serif; font-weight: 700; line-height: 0.95; letter-spacing: -0.03em; }
  .h-section { font-family: 'Inter', sans-serif; font-weight: 600; line-height: 1.05; letter-spacing: -0.025em; }

  /* === HERO === */
  .slide--hero { text-align: center; min-height: 70vh; display: none; flex-direction: column; align-items: center; justify-content: center; }
  .slide--hero.active { display: flex; }
  .hero-eyebrow { font-size: 12px; letter-spacing: 0.26em; color: var(--ink-mute); text-transform: uppercase; margin-bottom: 32px; font-weight: 600; }
  .hero-title { font-size: clamp(40px, 7vw, 110px); color: var(--ink); letter-spacing: -0.04em; max-width: 1100px; line-height: 1; }
  .hero-sub { font-size: clamp(20px, 2.6vw, 32px); margin-top: 22px; font-weight: 500; color: var(--ink-soft); font-family: 'Inter', sans-serif; }
  .hero-foot { margin-top: 40px; font-size: 13px; color: var(--ink-mute); letter-spacing: 0.14em; text-transform: uppercase; display: inline-flex; align-items: center; gap: 12px; }
  .hero-foot::before, .hero-foot::after { content:''; width: 32px; height: 1px; background: rgba(26,26,26,0.25); }

  /* === HUB === */
  .slide--hub { min-height: 75vh; position: relative; display: none; flex-direction: column; align-items: center; justify-content: center; }
  .slide--hub.active { display: flex; }
  .hub-eyebrow { font-size: 11px; letter-spacing: 0.22em; color: var(--ink-mute); text-transform: uppercase; margin-bottom: 28px; font-weight: 600; }
  .hub-title { font-size: clamp(56px, 9vw, 140px); text-align: center; text-transform: uppercase; letter-spacing: -0.045em; }
  .hub-title.is-warm { color: var(--warm); }
  .hub-title.is-ink { color: var(--ink); }
  .hub-title.is-outline { color: transparent; -webkit-text-stroke: 1.5px var(--ink); }
  .hub-title.is-phrase { text-transform: none; font-size: clamp(40px, 7vw, 96px); letter-spacing: -0.035em; line-height: 1.05; max-width: 1000px; }
  .hub-title.is-phrase em { font-style: normal; color: var(--warm); }
  .hub-sub { color: var(--ink-soft); font-size: 17px; margin-top: 22px; text-align: center; max-width: 640px; font-weight: 500; }
  .hub-quotes { position: absolute; inset: 0; pointer-events: none; }
  .hub-quote { position: absolute; color: var(--ink-soft); font-family: 'IBM Plex Mono', monospace; font-size: clamp(26px, 2.4vw, 34px); font-weight: 600; line-height: 1.2; max-width: 320px; letter-spacing: -0.005em; }
  .hub-quote.tl { top: 14%; left: 4%; text-align: left; }
  .hub-quote.tr { top: 14%; right: 4%; text-align: right; }
  .hub-quote.bl { bottom: 18%; left: 4%; text-align: left; }
  .hub-quote.br { bottom: 18%; right: 4%; text-align: right; }
  @media (max-width: 760px){ .hub-quote { display: none; } }

  /* === PLAN === */
  .slide--plan .plan-title { font-size: clamp(36px, 5vw, 60px); color: var(--ink); margin-bottom: 38px; }
  .plan-icons { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 48px; max-width: 980px; }
  .plan-icon-card { display: flex; gap: 16px; align-items: flex-start; padding: 22px 22px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; }
  .plan-icon-bubble { width: 44px; height: 44px; border-radius: 12px; background: var(--ink); color: var(--bg); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 22px; line-height: 1; font-weight: 700; }
  .plan-icon-text { font-size: 15px; line-height: 1.45; padding-top: 6px; color: var(--ink); font-weight: 500; }
  .plan-rule-label { font-size: 12px; letter-spacing: 0.18em; color: var(--ink-mute); text-transform: uppercase; margin-bottom: 16px; font-weight: 700; }
  .plan-pills { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; }
  .plan-pill { padding: 14px 26px; border-radius: 8px; font-weight: 600; font-size: 15px; border: 1px solid var(--border); }
  .plan-pill--gray { background: var(--surface); color: var(--ink); }
  .plan-pill--ink { background: var(--ink); color: var(--bg); border-color: transparent; }
  .plan-pill--ink-soft { background: rgba(26,26,26,0.10); color: var(--ink); border-color: transparent; }
  .plan-pill--warm { background: var(--warm); color: #fff; border-color: transparent; }
  .plan-pill-arrow { color: var(--ink-mute); font-size: 18px; }
  @media (max-width: 760px){ .plan-icons { grid-template-columns: 1fr; } .plan-pill { padding: 12px 20px; font-size: 13px; } }

  /* === BIG-STAT === */
  .slide--big-stat { text-align: center; min-height: 65vh; display: none; flex-direction: column; align-items: center; justify-content: center; }
  .slide--big-stat.active { display: flex; }
  .big-stat-eyebrow { font-size: 12px; letter-spacing: 0.24em; color: var(--ink-mute); text-transform: uppercase; margin-bottom: 22px; font-weight: 700; }
  .big-stat-value { font-size: clamp(72px, 13vw, 200px); color: var(--ink); white-space: nowrap; letter-spacing: -0.05em; }
  .big-stat-value.is-warm { color: var(--warm); }
  .big-stat-value.is-red { color: var(--red); }
  .big-stat-value.is-outline { color: transparent; -webkit-text-stroke: 2px var(--ink); }
  .big-stat-sub { font-size: clamp(18px, 2vw, 24px); color: var(--ink); font-weight: 500; margin-top: 22px; max-width: 720px; line-height: 1.4; }
  .big-stat-note { font-size: clamp(15px, 1.4vw, 17px); color: var(--ink-soft); margin-top: 18px; max-width: 760px; line-height: 1.55; font-weight: 500; }

  /* === TIMELINE-V === */
  .timeline-title { font-size: clamp(36px, 5vw, 60px); color: var(--ink); margin-bottom: 36px; text-align: center; }
  .timeline-v { display: flex; flex-direction: column; gap: 14px; max-width: 920px; margin: 0 auto; position: relative; }
  .timeline-row { display: grid; grid-template-columns: 64px 1fr; gap: 22px; align-items: center; position: relative; }
  .timeline-row::before { content:''; position: absolute; top: 100%; left: 31px; width: 1.5px; height: 14px; background: rgba(26,26,26,0.18); }
  .timeline-row:last-child::before { display: none; }
  .timeline-chip { width: 64px; height: 64px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-family: 'Inter', sans-serif; font-weight: 600; font-size: 24px; flex-shrink: 0; position: relative; z-index: 2; letter-spacing: -0.02em; }
  .timeline-chip.is-ink { background: var(--ink); color: var(--bg); }
  .timeline-chip.is-warm { background: var(--warm); color: #fff; }
  .timeline-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 18px 24px; min-height: 64px; display: flex; flex-direction: column; justify-content: center; }
  .timeline-card.is-warm { background: var(--warm-soft); border-color: var(--warm-line); }
  .timeline-card__title { font-size: 17px; font-weight: 700; color: var(--ink); margin-bottom: 4px; }
  .timeline-card__sub { font-size: 14.5px; color: var(--ink-soft); line-height: 1.5; font-weight: 500; }
  .timeline-v.is-reveal .timeline-row::before { display: none; }
  .timeline-v.is-reveal .timeline-row:not(.is-revealed) { display: none; }
  @keyframes timelineRowReveal { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .timeline-v.is-reveal .timeline-row.is-revealed { animation: timelineRowReveal 0.5s cubic-bezier(.2,.6,.2,1); }
  .timeline-progress { margin: 32px auto 0; display: flex; gap: 8px; justify-content: center; }
  .timeline-progress__dot { width: 28px; height: 4px; border-radius: 2px; background: rgba(26,26,26,0.18); transition: background 0.25s; }
  .timeline-progress__dot.is-revealed { background: var(--ink); }
  .timeline-hint { margin: 14px auto 0; text-align: center; font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-mute); font-weight: 600; }
  .timeline-foot { margin: 32px auto 0; text-align: center; display: flex; align-items: center; justify-content: center; gap: 14px; flex-wrap: wrap; }
  .timeline-foot__pill { padding: 14px 26px; border-radius: 8px; background: var(--surface); border: 1px solid var(--border); font-weight: 700; font-size: 17px; color: var(--ink); }
  .timeline-foot__pill.is-ink { background: var(--ink); color: var(--bg); border-color: transparent; }
  .timeline-foot__pill.is-warm { background: var(--warm); color: #fff; border-color: transparent; }
  .timeline-foot__arrow { color: var(--ink-mute); font-size: 22px; font-weight: 600; }
  .timeline-foot__pill[data-chain-step] { background: var(--surface); color: var(--ink); border-color: var(--border); transition: background 0.35s ease, color 0.35s ease, border-color 0.35s ease; }
  .timeline-foot__pill.is-chain-past { background: var(--ink); color: var(--bg); border-color: transparent; }
  .timeline-foot__pill.is-chain-current { background: var(--warm); color: #fff; border-color: transparent; }

  /* === ANKETA === */
  .slide--anketa { text-align: center; min-height: 70vh; display: none; flex-direction: column; align-items: center; justify-content: center; position: relative; }
  .slide--anketa.active { display: flex; }
  .anketa-block__quotes { margin-top: 28px; width: 100%; display: flex; justify-content: space-between; align-items: flex-end; gap: 14px; flex-wrap: wrap; }
  .anketa-block__quote { font-family: 'IBM Plex Mono', monospace; font-size: clamp(18px, 1.7vw, 24px); color: var(--ink-soft); font-weight: 600; line-height: 1.2; letter-spacing: -0.005em; max-width: 23%; flex: 0 1 auto; opacity: 0.9; }
  .anketa-block__quote.bl { text-align: left; transform: rotate(-2deg); }
  .anketa-block__quote.bcl { text-align: center; transform: rotate(-1deg); }
  .anketa-block__quote.bc { text-align: center; transform: rotate(-1deg); }
  .anketa-block__quote.bcr { text-align: center; transform: rotate(1deg); }
  .anketa-block__quote.br { text-align: right; transform: rotate(2deg); }
  @media (max-width: 760px){ .anketa-block__quotes { gap: 8px; margin-top: 20px; } .anketa-block__quote { font-size: 16px; max-width: 24%; } }
  @media (max-width: 540px){ .anketa-block__quote { font-size: 14px; max-width: 48%; } }
  .anketa-eyebrow { font-size: 12px; letter-spacing: 0.22em; color: var(--ink-mute); text-transform: uppercase; margin-bottom: 24px; font-weight: 700; }
  .anketa-title { font-size: clamp(26px, 3.4vw, 44px); color: var(--ink); line-height: 1.22; letter-spacing: -0.022em; max-width: 1000px; margin-bottom: 44px; font-family: 'Inter', sans-serif; font-weight: 600; }
  .anketa-title em { font-style: normal; color: var(--warm); }
  .anketa-block { margin: 0 auto; width: 100%; max-width: 920px; background: var(--surface); border: 2px solid var(--ink); border-radius: 12px; padding: 38px 48px 36px; display: flex; flex-direction: column; align-items: center; }
  .anketa-block__tag { display: inline-block; font-size: 12px; letter-spacing: 0.22em; color: var(--warm); text-transform: uppercase; font-weight: 700; padding: 9px 20px; background: var(--warm-soft); border: 1px solid var(--warm-line); border-radius: 12px; margin-bottom: 22px; }
  .anketa-block__label { font-family: 'IBM Plex Mono', monospace; font-size: clamp(36px, 4.4vw, 56px); color: var(--ink); font-weight: 600; line-height: 1; margin-bottom: 24px; letter-spacing: -0.005em; }
  .anketa-block__items { list-style: none; display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin: 0; padding: 0; }
  .anketa-block__items li { font-size: 17px; font-weight: 600; color: var(--ink); padding: 12px 22px; background: var(--surface-tint); border: 1px solid var(--border); border-radius: 20px; line-height: 1.2; }
  .anketa-strap { text-align: center; margin: 32px auto 0; font-size: clamp(16px, 1.9vw, 22px); color: var(--ink-soft); max-width: 700px; line-height: 1.5; font-style: italic; }
  @media (max-width: 760px){ .anketa-block { padding: 28px 22px 30px; } .anketa-block__items li { font-size: 15px; padding: 10px 16px; } }

  /* === DAY === */
  .day-title { font-size: clamp(36px, 5vw, 60px); color: var(--ink); margin-bottom: 36px; text-align: center; }
  .day-title em { font-style: normal; color: var(--warm); }
  .day-list { display: flex; flex-direction: column; gap: 12px; max-width: 800px; margin: 0 auto; width: 100%; }
  .day-row { display: grid; grid-template-columns: 130px 1fr; gap: 22px; align-items: baseline; padding: 22px 28px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; }
  .day-row__time { font-family: 'Inter', sans-serif; font-weight: 600; font-size: 13px; letter-spacing: 0.1em; color: var(--warm); text-transform: uppercase; }
  .day-row__text { font-size: 18px; color: var(--ink); font-weight: 700; line-height: 1.3; }
  .day-row__text small { display: block; color: var(--ink-soft); font-size: 14.5px; margin-top: 5px; font-weight: 500; line-height: 1.5; }
  .day-foot { margin: 28px auto 0; text-align: center; font-size: clamp(16px, 1.9vw, 22px); color: var(--ink-soft); max-width: 720px; font-weight: 500; line-height: 1.5; }
  .day-foot strong { color: var(--ink); font-weight: 700; }
  @media (max-width: 760px){ .day-row { grid-template-columns: 100px 1fr; padding: 16px 18px; gap: 14px; } .day-row__time { font-size: 11px; } .day-row__text { font-size: 15px; } }

  /* === SPLIT-2 === */
  .split-title { font-size: clamp(36px, 5vw, 60px); color: var(--ink); margin-bottom: 32px; text-align: center; }
  .split-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; max-width: 1080px; margin: 0 auto; }
  .split-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 30px 32px; }
  .split-card.is-tint { background: var(--surface-tint); }
  .split-card__tag { display: inline-block; font-size: 11px; letter-spacing: 0.2em; color: var(--ink-mute); text-transform: uppercase; margin-bottom: 14px; font-weight: 700; padding: 5px 10px; border: 1px solid var(--border-strong); border-radius: 20px; }
  .split-card__tag.is-warm { color: var(--warm); border-color: var(--warm-line); }
  .split-card__title { font-size: 22px; font-weight: 700; line-height: 1.25; margin-bottom: 16px; color: var(--ink); }
  .split-card__list { display: flex; flex-direction: column; gap: 8px; }
  .split-card__list li { display: flex; gap: 10px; font-size: 15px; color: var(--ink-soft); list-style: none; line-height: 1.45; }
  .split-card__list li::before { content:''; width: 5px; height: 5px; border-radius: 50%; background: var(--ink); margin-top: 9px; flex-shrink: 0; }
  .split-strapline { text-align: center; margin-top: 30px; font-size: clamp(18px, 2.4vw, 26px); font-weight: 600; color: var(--ink); max-width: 800px; margin-left: auto; margin-right: auto; line-height: 1.4; }
  .split-strapline em { font-style: normal; color: var(--warm); }
  @media (max-width: 760px){ .split-grid { grid-template-columns: 1fr; } }

  /* === STATEMENT === */
  .slide--statement { text-align: center; min-height: 50vh; display: none; flex-direction: column; align-items: center; justify-content: center; }
  .slide--statement.active { display: flex; }
  .statement-title { font-size: clamp(34px, 5vw, 64px); font-weight: 700; line-height: 1.1; letter-spacing: -0.025em; max-width: 900px; color: var(--ink); font-family: 'Inter', sans-serif; }
  .statement-title em { font-style: normal; color: var(--warm); }
  .statement-sub { margin-top: 22px; color: var(--ink-soft); font-size: clamp(16px, 1.9vw, 24px); max-width: 760px; line-height: 1.5; }
  .statement-sub strong { color: var(--ink); font-weight: 700; }
  .statement-eyebrow { font-size: 12px; letter-spacing: 0.24em; color: var(--ink-mute); text-transform: uppercase; margin-bottom: 22px; font-weight: 700; }
  .statement-foot { margin-top: 30px; color: var(--warm); font-family: 'IBM Plex Mono', monospace; font-size: clamp(28px, 3vw, 40px); font-weight: 600; letter-spacing: -0.005em; line-height: 1.2; max-width: 720px; }

  /* === MANIFESTO === */
  .slide--manifesto { text-align: center; min-height: 60vh; display: none; flex-direction: column; align-items: center; justify-content: center; }
  .slide--manifesto.active { display: flex; }
  .manifesto-title { font-size: clamp(48px, 8vw, 110px); color: var(--ink); line-height: 0.96; letter-spacing: -0.045em; max-width: 1000px; }
  .manifesto-title.is-small { font-size: clamp(28px, 3.6vw, 48px); line-height: 1.18; letter-spacing: -0.025em; max-width: 920px; font-weight: 600; }
  .manifesto-title em { font-style: normal; color: var(--warm); }
  .manifesto-sub { margin-top: 28px; font-size: clamp(18px, 2.2vw, 24px); color: var(--ink-soft); font-weight: 500; max-width: 720px; line-height: 1.45; }

  /* === CHECKLIST === */
  .checklist-eyebrow { font-size: 12px; letter-spacing: 0.22em; color: var(--ink-mute); text-transform: uppercase; margin-bottom: 18px; font-weight: 700; text-align: center; }
  .checklist-title { font-size: clamp(36px, 5vw, 60px); color: var(--ink); margin-bottom: 36px; text-align: center; }
  .checklist { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; max-width: 1080px; margin: 0 auto; }
  .checklist.is-reveal .check-card:not(.is-revealed) { display: none; }
  @keyframes checkCardReveal { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .checklist.is-reveal .check-card.is-revealed { animation: checkCardReveal 0.5s cubic-bezier(.2,.6,.2,1); }
  .check-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 28px; position: relative; }
  .check-card__num { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 36px; -webkit-text-stroke: 1.2px rgba(26,26,26,0.4); color: transparent; line-height: 1; margin-bottom: 18px; }
  .check-card__text { font-size: 17px; color: var(--ink); font-weight: 600; line-height: 1.35; }
  .check-card__icon { position: absolute; top: 24px; right: 24px; width: 26px; height: 26px; border-radius: 50%; border: 1.5px solid var(--ink); display: flex; align-items: center; justify-content: center; color: var(--ink); font-size: 13px; font-weight: 700; }
  @media (max-width: 760px){ .checklist { grid-template-columns: 1fr; } }

  /* === GRID 2x2 === */
  .grid22-title { font-size: clamp(40px, 6vw, 72px); color: var(--ink); margin-bottom: 36px; text-align: center; }
  .grid22 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; max-width: 1000px; margin: 0 auto; }
  .grid22-cell { padding: 30px 32px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; position: relative; }
  .grid22-cell.alt { background: var(--surface-tint); }
  .grid22-cell.is-wide { grid-column: span 2; }

        { time:'ЖИЗНЬ', t:'10+ стран за 3 года', s:'Доход 400–600 тыс. ₽ в месяц. ИИ — его главный рабочий инструмент.' }
      ],
      foot:'Обучил сотни студентов. <strong>Рынок молодой — входи сейчас, пока конкурентов мало.</strong>'
    },

    // 21 · Day — Полина
    { type:'day',
      title:'Наставник: <em>Полина</em>',
      rows:[
        { time:'МАСШТАБ', t:'Эксперт по техническим решениям', s:'Сопровождала проекты с оборотом 1,5 млрд руб/год. Руководила отделом 10+ человек.' },
        { time:'СТИЛЬ', t:'Честная обратная связь', s:'Помогает разобраться даже в самых сложных темах. Проверяет домашки, не даёт застрять.' },
        { time:'ЖИЗНЬ', t:'С 2019 года — только в онлайн', s:'Путешествует по миру и России, работая удалённо.' }
      ],
      foot:'Эксперт по поиску клиентов и продажам. <strong>Ждёт вас на каждом этапе обучения.</strong>'
    },

    // 22 · Split — Поддержка после курса
    { type:'split-2',
      title:'Поддержка после курса',
      cols:[
        { tag:'Чат выпускников', tagTone:'', title:'Вы не остаётесь одни',
          items:[
            'Свежие вакансии и заказы — публикуются постоянно',
            'Telegram, Авито, LinkedIn — активный поиск клиентов',
            'Сообщество ИИ-инженеров для обмена опытом'
          ]
        },
        { tag:'Карьерный трек', tagTone:'warm', title:'Фриланс или найм?',
          tint:true,
          items:[
            'Фриланс: первые заказы ещё во время курса',
            'Найм: оффер от работодателя от 150к ₽/мес',
            'Разбираем оба пути — выбираешь свой'
          ]
        }
      ],
      strapline:'Рынок молодой. Конкурентов мало. <em>Лучший момент войти — сейчас.</em>'
    },

    // 23 · Checklist — Что в итоге
    { type:'checklist',
      eyebrow:'Что в итоге?',
      title:'За 2 месяца ты получишь',
      reveal:true,
      items:[
        'Полный комплект инструментов ИИ-инженера — включая вайб-кодинг',
        '3–5 реальных проектов в портфолио: боты, автоматизации, ассистенты',
        'Первых клиентов или оффер от работодателя',
        'Онлайн-профессию с доходом от 150 000 ₽/мес',
        'Навык, который работает из любой точки мира — без офиса',
        'И самое главное — уверенность, что ты можешь это'
      ]
    },

    // 24 · Q&A
    { type:'qa',
      title:'Q&A',
      sub:'Задавайте вопросы — отвечаю по очереди.'
    },

    // 25 · Финал
    { type:'final',
      title:'Стань первым.',
      sub:'Рынок молодой. Конкурентов мало. Время — сейчас.'
    }

  ];

  // ========== РЕНДЕР ==========
  function el(tag, cls, html){
    const e = document.createElement(tag);
    if (cls) e.className = cls;
    if (html !== undefined) e.innerHTML = html;
    return e;
  }

  function renderHub(s){
    const wrap = el('section', 'slide slide--hub');
    if (s.eyebrow) wrap.appendChild(el('div', 'hub-eyebrow', s.eyebrow));
    const toneCls = s.tone === 'warm' ? 'is-warm' : s.tone === 'outline' ? 'is-outline' : 'is-ink';
    const sizeCls = s.size === 'phrase' ? ' is-phrase' : '';
    wrap.appendChild(el('h1', 'hub-title h-display ' + toneCls + sizeCls, s.title));
    if (s.sub) wrap.appendChild(el('div', 'hub-sub', s.sub));
    if (s.quotes && s.quotes.length){
      const qbox = el('div', 'hub-quotes');
      s.quotes.forEach(q => qbox.appendChild(el('div', 'hub-quote ' + q.p, q.t)));
      wrap.appendChild(qbox);
    }
    return wrap;
  }

  function renderHero(s){
    const wrap = el('section', 'slide slide--hero');
    if (s.eyebrow) wrap.appendChild(el('div', 'hero-eyebrow', s.eyebrow));
    wrap.appendChild(el('h1', 'hero-title h-display', s.title));
    if (s.sub) wrap.appendChild(el('div', 'hero-sub', s.sub));
    if (s.foot) wrap.appendChild(el('div', 'hero-foot', s.foot));
    return wrap;
  }

  function renderPlan(s){
    const wrap = el('section', 'slide slide--plan');
    wrap.appendChild(el('h2', 'plan-title h-section', s.title));
    const icons = el('div', 'plan-icons');
    s.icons.forEach(ic => {
      const card = el('div', 'plan-icon-card');
      card.appendChild(el('div', 'plan-icon-bubble', ic.i));
      card.appendChild(el('div', 'plan-icon-text', ic.t));
      icons.appendChild(card);
    });
    wrap.appendChild(icons);
    wrap.appendChild(el('div', 'plan-rule-label', s.ruleLabel));
    const pills = el('div', 'plan-pills');
    s.pills.forEach((p, i) => {
      if (i > 0) pills.appendChild(el('span', 'plan-pill-arrow', '→'));
      pills.appendChild(el('div', 'plan-pill plan-pill--' + p.cls, p.t));
    });
    wrap.appendChild(pills);
    return wrap;
  }

  function renderBigStat(s){
    const wrap = el('section', 'slide slide--big-stat');
    if (s.eyebrow) wrap.appendChild(el('div', 'big-stat-eyebrow', s.eyebrow));
    const toneCls = s.tone === 'warm' ? 'is-warm' : s.tone === 'red' ? 'is-red' : s.tone === 'outline' ? 'is-outline' : '';
    wrap.appendChild(el('div', 'big-stat-value h-display ' + toneCls, s.value));
    if (s.sub) wrap.appendChild(el('div', 'big-stat-sub', s.sub));
    if (s.note) wrap.appendChild(el('div', 'big-stat-note', s.note));
    return wrap;
  }

  function renderTimelineV(s){
    const wrap = el('section', 'slide slide--timeline');
    wrap.appendChild(el('h2', 'timeline-title h-section', s.title));
    const tl = el('div', 'timeline-v' + (s.reveal ? ' is-reveal' : ''));
    s.steps.forEach((st, i) => {
      const row = el('div', 'timeline-row');
      if (s.reveal){ row.dataset.step = i; if (i === 0) row.classList.add('is-revealed'); }
      const tone = i % 2 === 0 ? 'is-ink' : 'is-warm';
      row.appendChild(el('div', 'timeline-chip ' + tone, String(i+1)));
      const card = el('div', 'timeline-card' + (tone === 'is-warm' ? ' is-warm' : ''));
      card.appendChild(el('div', 'timeline-card__title', st.t));
      if (st.s) card.appendChild(el('div', 'timeline-card__sub', st.s));
      row.appendChild(card);
      tl.appendChild(row);
    });
    wrap.appendChild(tl);
    if (s.reveal){
      const prog = el('div', 'timeline-progress');
      s.steps.forEach((st, i) => {
        const dot = el('div', 'timeline-progress__dot' + (i === 0 ? ' is-revealed' : ''));
        dot.dataset.step = i;
        prog.appendChild(dot);
      });
      wrap.appendChild(prog);
      if (s.hint) wrap.appendChild(el('div', 'timeline-hint', s.hint));
      wrap.dataset.reveal = 'true';
      wrap.dataset.stepsTotal = s.steps.length;
    }
    if (s.foot && s.foot.length){
      const f = el('div', 'timeline-foot');
      let chainIdx = 0;
      s.foot.forEach(item => {
        if (item.a) f.appendChild(el('div', 'timeline-foot__arrow', item.a));
        else {
          const cls = !s.footChain && item.cls === 'ink' ? 'is-ink' : !s.footChain && item.cls === 'warm' ? 'is-warm' : '';
          const pill = el('div', 'timeline-foot__pill ' + cls, item.t);
          if (s.footChain){ pill.dataset.chainStep = chainIdx; if (chainIdx === 0) pill.classList.add('is-chain-current'); chainIdx++; }
          f.appendChild(pill);
        }
      });
      wrap.appendChild(f);
    }
    return wrap;
  }

  function renderAnketa(s){
    const wrap = el('section', 'slide slide--anketa');
    if (s.eyebrow) wrap.appendChild(el('div', 'anketa-eyebrow', s.eyebrow));
    wrap.appendChild(el('h2', 'anketa-title', s.title));
    const block = el('div', 'anketa-block');
    if (s.tag) block.appendChild(el('div', 'anketa-block__tag', s.tag));
    if (s.label) block.appendChild(el('div', 'anketa-block__label', s.label));
    const ul = el('ul', 'anketa-block__items');
    s.items.forEach(it => ul.appendChild(el('li', '', it)));
    block.appendChild(ul);
    if (s.quotes && s.quotes.length){
      const qwrap = el('div', 'anketa-block__quotes');
      const order = { bl: 0, bcl: 1, bc: 2, bcr: 3, br: 4 };
      s.quotes.filter(q => q.p in order).sort((a, b) => order[a.p] - order[b.p])
        .forEach(q => qwrap.appendChild(el('div', 'anketa-block__quote ' + q.p, q.t)));
      if (qwrap.children.length) block.appendChild(qwrap);
    }
    wrap.appendChild(block);
    if (s.strap) wrap.appendChild(el('div', 'anketa-strap', s.strap));
    return wrap;
  }

  function renderSplit2(s){
    const wrap = el('section', 'slide slide--split');
    wrap.appendChild(el('h2', 'split-title h-section', s.title));
    const grid = el('div', 'split-grid');
    s.cols.forEach(c => {
      const card = el('div', 'split-card' + (c.tint ? ' is-tint' : ''));
      card.appendChild(el('div', 'split-card__tag ' + (c.tagTone === 'warm' ? 'is-warm' : ''), c.tag));
      card.appendChild(el('div', 'split-card__title', c.title));
      const ul = el('ul', 'split-card__list');
      c.items.forEach(it => ul.appendChild(el('li', '', it)));
      card.appendChild(ul);
      grid.appendChild(card);
    });
    wrap.appendChild(grid);
    if (s.strapline) wrap.appendChild(el('div', 'split-strapline', s.strapline));
    return wrap;
  }

  function renderDay(s){
    const wrap = el('section', 'slide slide--day');
    wrap.appendChild(el('h2', 'day-title h-section', s.title));
    const list = el('div', 'day-list');
    s.rows.forEach(r => {
      const row = el('div', 'day-row');
      row.appendChild(el('div', 'day-row__time', r.time));
      const text = el('div', 'day-row__text');
      text.innerHTML = r.t + (r.s ? '<small>' + r.s + '</small>' : '');
      row.appendChild(text);
      list.appendChild(row);
    });
    wrap.appendChild(list);
    if (s.foot) wrap.appendChild(el('div', 'day-foot', s.foot));
    return wrap;
  }

  function renderStatement(s){
    const wrap = el('section', 'slide slide--statement');
    if (s.eyebrow) wrap.appendChild(el('div', 'statement-eyebrow', s.eyebrow));
    if (s.title) wrap.appendChild(el('h2', 'statement-title', s.title));
    if (s.lines && s.lines.length){
      const block = el('div', 'statement-lines');
      s.lines.forEach(line => block.appendChild(el('div', 'statement-line', line)));
      wrap.appendChild(block);
    }
    if (s.sub) wrap.appendChild(el('div', 'statement-sub', s.sub));
    if (s.foot) wrap.appendChild(el('div', 'statement-foot', s.foot));
    return wrap;
  }

  function renderManifesto(s){
    const wrap = el('section', 'slide slide--manifesto');
    const sizeCls = s.size === 'small' ? ' is-small' : '';
    wrap.appendChild(el('h2', 'manifesto-title h-display' + sizeCls, s.title));
    if (s.sub) wrap.appendChild(el('div', 'manifesto-sub', s.sub));
    return wrap;
  }

  function renderChecklist(s){
    const wrap = el('section', 'slide slide--checklist');
    if (s.eyebrow) wrap.appendChild(el('div', 'checklist-eyebrow', s.eyebrow));
    wrap.appendChild(el('h2', 'checklist-title h-section', s.title));
    const grid = el('div', 'checklist' + (s.reveal ? ' is-reveal' : ''));
    s.items.forEach((item, i) => {
      const card = el('div', 'check-card');
      if (s.reveal){ card.dataset.step = i; if (i === 0) card.classList.add('is-revealed'); }
      card.appendChild(el('div', 'check-card__icon', '✓'));
      card.appendChild(el('div', 'check-card__num', '0' + (i+1)));
      card.appendChild(el('div', 'check-card__text', item));
      grid.appendChild(card);
    });
    wrap.appendChild(grid);
    if (s.reveal){
      const prog = el('div', 'timeline-progress');
      s.items.forEach((item, i) => {
        const dot = el('div', 'timeline-progress__dot' + (i === 0 ? ' is-revealed' : ''));
        dot.dataset.step = i;
        prog.appendChild(dot);
      });
      wrap.appendChild(prog);
      wrap.dataset.reveal = 'true';
      wrap.dataset.stepsTotal = s.items.length;
    }
    return wrap;
  }

  function renderGrid22(s){
    const wrap = el('section', 'slide slide--grid22');
    wrap.appendChild(el('h2', 'grid22-title h-section', s.title));
    const grid = el('div', 'grid22');
    const total = s.items.length;
    s.items.forEach((it, i) => {
      const isOddTail = total % 2 === 1 && i === total - 1;
      const cell = el('div', 'grid22-cell' + (it.alt ? ' alt' : '') + (isOddTail ? ' is-wide' : ''));
      cell.appendChild(el('div', 'grid22-cell__num', it.num));
      cell.appendChild(el('div', 'grid22-cell__title', it.t));
      cell.appendChild(el('div', 'grid22-cell__sub', it.s));
      grid.appendChild(cell);
    });
    wrap.appendChild(grid);
    return wrap;
  }

  function renderQA(s){
    const wrap = el('section', 'slide slide--qa');
    wrap.appendChild(el('h2', 'qa-title h-display', s.title));
    if (s.sub) wrap.appendChild(el('div', 'qa-sub', s.sub));
    return wrap;
  }

  function renderFinal(s){
    const wrap = el('section', 'slide slide--final');
    wrap.appendChild(el('h2', 'final-title h-display', s.title));
    if (s.sub) wrap.appendChild(el('div', 'final-sub', s.sub));
    return wrap;
  }

  const RENDERERS = {
    hero: renderHero, plan: renderPlan, hub: renderHub,
    'big-stat': renderBigStat, 'timeline-v': renderTimelineV,
    anketa: renderAnketa, day: renderDay, 'split-2': renderSplit2,
    statement: renderStatement, manifesto: renderManifesto,
    checklist: renderChecklist, grid22: renderGrid22,
    qa: renderQA, final: renderFinal
  };

  const deck = document.getElementById('deck');
  slides.forEach((s, i) => {
    const node = RENDERERS[s.type](s);
    node.dataset.index = i;
    deck.appendChild(node);
  });

  const total = slides.length;
  document.getElementById('navTotal').textContent = total;
  const navNow = document.getElementById('navNow');
  const btnPrev = document.getElementById('btnPrev');
  const btnNext = document.getElementById('btnNext');

  let current = 0;
  let currentStep = 0;

  function getCurrentSlide(){ return document.querySelectorAll('.slide')[current]; }
  function getStepInfo(slide){
    if (!slide || slide.dataset.reveal !== 'true') return null;
    return { total: parseInt(slide.dataset.stepsTotal, 10) || 0 };
  }
  function updateStepReveal(slide){
    if (!slide) return;
    slide.setAttribute('data-current-step', currentStep);
    slide.querySelectorAll('[data-step]').forEach(node => {
      const step = parseInt(node.dataset.step, 10);
      if (step <= currentStep) node.classList.add('is-revealed'); else node.classList.remove('is-revealed');
      if (step === currentStep) node.classList.add('is-current'); else node.classList.remove('is-current');
    });
    slide.querySelectorAll('[data-chain-step]').forEach(node => {
      const step = parseInt(node.dataset.chainStep, 10);
      node.classList.toggle('is-chain-past', step < currentStep);
      node.classList.toggle('is-chain-current', step === currentStep);
    });
  }
  function updateNav(){
    const slide = getCurrentSlide();
    const info = getStepInfo(slide);
    const atFirstStep = !info || currentStep === 0;
    const atLastStep = !info || currentStep === info.total - 1;
    btnPrev.disabled = current === 0 && atFirstStep;
    btnNext.disabled = current === total - 1 && atLastStep;
  }

  function show(i, direction){
    current = Math.max(0, Math.min(total - 1, i));
    document.querySelectorAll('.slide').forEach(s => {
      if (+s.dataset.index === current) s.classList.add('active'); else s.classList.remove('active');
    });
    navNow.textContent = current + 1;
    const slide = getCurrentSlide();
    const info = getStepInfo(slide);
    if (info){ currentStep = direction === 'back' ? info.total - 1 : 0; updateStepReveal(slide); }
    else { currentStep = 0; }
    updateNav();
    window.scrollTo({ top: 0, behavior: 'instant' });
    history.replaceState(null, '', '#' + (current + 1));
  }

  function next(){
    const slide = getCurrentSlide();
    const info = getStepInfo(slide);
    if (info && currentStep < info.total - 1){ currentStep++; updateStepReveal(slide); updateNav(); return; }
    if (current < total - 1) show(current + 1, 'forward');
  }
  function prev(){
    const slide = getCurrentSlide();
    const info = getStepInfo(slide);
    if (info && currentStep > 0){ currentStep--; updateStepReveal(slide); updateNav(); return; }
    if (current > 0) show(current - 1, 'back');
  }

  btnPrev.addEventListener('click', prev);
  btnNext.addEventListener('click', next);

  const btnMenu = document.getElementById('btnMenu');
  const navMenu = document.getElementById('navMenu');

  function getSlideLabel(s){
    if (s.title){ const stripped = String(s.title).replace(/<[^>]+>/g, '').trim(); if (stripped) return stripped; }
    if (s.eyebrow) return String(s.eyebrow);
    if (s.value) return String(s.value);
    return '—';
  }

  slides.forEach((s, i) => {
    const btn = document.createElement('button');
    btn.className = 'nav-menu__item';
    btn.dataset.idx = i;
    btn.innerHTML = '<span class="nav-menu__num">' + (i+1) + '</span><span class="nav-menu__label">' + getSlideLabel(s) + '</span>';
    btn.addEventListener('click', () => { show(i, 'forward'); closeMenu(); });
    navMenu.appendChild(btn);
  });

  function syncMenuActive(){
    navMenu.querySelectorAll('.nav-menu__item').forEach((el, idx) => { el.classList.toggle('is-active', idx === current); });
  }
  function openMenu(){ navMenu.hidden = false; syncMenuActive(); const active = navMenu.querySelector('.is-active'); if (active) active.scrollIntoView({ block: 'center' }); }
  function closeMenu(){ navMenu.hidden = true; }
  function toggleMenu(){ navMenu.hidden ? openMenu() : closeMenu(); }

  btnMenu.addEventListener('click', (e) => { e.stopPropagation(); toggleMenu(); });
  document.addEventListener('click', (e) => { if (!navMenu.hidden && !navMenu.contains(e.target) && e.target !== btnMenu) closeMenu(); });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && !navMenu.hidden) { closeMenu(); return; }
    if (!navMenu.hidden) return;
    if (e.key === 'ArrowRight' || e.key === 'PageDown' || e.key === ' ') { e.preventDefault(); next(); }
    else if (e.key === 'ArrowLeft' || e.key === 'PageUp') { e.preventDefault(); prev(); }
    else if (e.key === 'Home') show(0);
    else if (e.key === 'End') show(total - 1);
  });

  let touchX = null;
  document.addEventListener('touchstart', (e) => { touchX = e.touches[0].clientX; }, {passive:true});
  document.addEventListener('touchend', (e) => {
    if (touchX === null) return;
    const dx = e.changedTouches[0].clientX - touchX;
    if (Math.abs(dx) > 50) { if (dx < 0) next(); else prev(); }
    touchX = null;
  }, {passive:true});

  const hash = parseInt(location.hash.replace('#',''), 10);
  if (hash >= 1 && hash <= total) show(hash - 1); else show(0);
</script>
</body>
